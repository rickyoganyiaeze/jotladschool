<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | jolad Schools</title>
    <base href="/">
    <link rel="icon" type="image/png" href="images/favicon.jpeg">
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Poppins:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(135deg, var(--Primary-blue) 0%, var(--Primary-blue-dark) 100%);
            color: white;
            padding: 2rem;
            flex-shrink: 0;
        }

        .sidebar h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgb(255, 255, 255);
            padding-bottom: 1rem;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar li {
            margin-bottom: 1rem;
        }

        .sidebar a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 600;
            display: block;
            padding: 0.75rem;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .main-content {
            flex: 1;
            background: var(--off-white);
            padding: 2rem;
            overflow-y: auto;
        }

        .page-title {
            margin-bottom: 2rem;
        }

        .card {
            background: white;
            border-radius: var(--border-radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
        }

        .card h3 {
            margin-bottom: 1.5rem;
            color: var(--Primary-blue);
            border-bottom: 2px solid var(--off-white);
            padding-bottom: 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--light-gray);
        }

        th {
            background: var(--off-white);
            font-weight: 700;
            color: var(--text-dark);
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .admin-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                padding: 1rem;
            }

            .sidebar ul {
                display: flex;
                overflow-x: auto;
                gap: 0.5rem;
            }

            .sidebar li {
                margin-bottom: 0;
            }
        }
    </style>
</head>

<body>

    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2 style="color: white;">jolad Admin</h2>

            <ul>
                <li><a href="index.html"><i class="fas fa-globe"></i> View Website</a></li>
                <li><a href="#" class="active"><i class="fas fa-upload"></i> Upload Result</a></li>
                <li><a href="#" onclick="alert('Logout functionality not needed for single admin key.')"><i
                            class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <div class="page-title">
                <h1 style="color: #ff6600;">Dashboard</h1>
                <p>Manage student results and uploads.</p>
            </div>

            <!-- Upload Form Card -->
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> Upload New Result</h3>
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Admission Number</label>
                            <input type="text" id="admNo" class="form-control" placeholder="e.g. JTC/2024/001" required>
                        </div>
                        <div class="form-group">
                            <label>Student Name</label>
                            <input type="text" id="sName" class="form-control" placeholder="Full Name" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Class</label>
                            <input type="text" id="sClass" class="form-control" placeholder="e.g. JSS 1" required>
                        </div>
                        <div class="form-group">
                            <label>Result File (PDF/Image)</label>
                            <input type="file" id="resultFile" class="form-control" accept="image/*,.pdf" required>
                        </div>
                    </div>

                    <div style="background: var(--off-white); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                        <p style="font-size: 0.9rem; margin-bottom: 0.5rem;"><strong>Availability (Optional):</strong>
                            Leave blank for always available.</p>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Start Date</label>
                                <input type="datetime-local" id="startTime" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>End Date</label>
                                <input type="datetime-local" id="endTime" class="form-control">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-accent btn-lg">
                        <i class="fas fa-upload"></i> Upload Result
                    </button>
                    <p id="uploadMsg" style="margin-top:1rem; color:green;"></p>
                </form>
            </div>

            <!-- Results List Card -->
            <div class="card">
                <h3><i class="fas fa-list"></i> All Uploaded Results</h3>
                <div style="overflow-x: auto;">
                    <table id="resultsTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Adm No</th>
                                <th>Class</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Results will load here -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        // SECURITY LOCK - Put this first!
        if (sessionStorage.getItem('adminAuthorized') !== 'true') {
            window.location.href = "login.html"; // Kick them out if not logged in
        }
        // IMPORTANT: Change this to your live Render URL
        const API_URL = 'https://joladschool.onrender.com/api';
        const ADMIN_KEY = 'mySecretAdminKey123'; // Must match your .env variable

    // --- RESULTS TABLE LOGIC ---
    async function loadResults() {
      const tbody = document.getElementById('resultsTableBody');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Loading...</td></tr>';

      try {
        // This now returns results without the heavy file data
        const res = await fetch(`${API_URL}/admin/results?key=${ADMIN_KEY}`);
        const data = await res.json();

        if (data.results.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No results found.</td></tr>';
          return;
        }

        tbody.innerHTML = '';
        data.results.forEach(r => {
          const date = new Date(r.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
          
          const now = new Date();
          let status = '<span class="badge badge-success">Available</span>';
          if (r.availabilityStart && r.availabilityEnd) {
             if (now < new Date(r.availabilityStart)) status = '<span class="badge" style="background:#ffeeba; color:#856404;">Scheduled</span>';
             if (now > new Date(r.availabilityEnd)) status = '<span class="badge" style="background:#f5c6cb; color:#721c24;">Expired</span>';
          }

          tbody.innerHTML += `
            <tr>
              <td>${date}</td>
              <td><strong>${r.studentName}</strong></td>
              <td>${r.admissionNumber}</td>
              <td>${r.studentClass}</td>
              <td>${status}</td>
              <td>
                <button class="action-btn btn-edit" onclick="openEditModal('${r._id}', '${r.admissionNumber}', '${r.studentName}', '${r.studentClass}', '${r.availabilityStart}', '${r.availabilityEnd}')">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="action-btn btn-delete" onclick="deleteResult('${r._id}')">
                  <i class="fas fa-trash"></i>
                </button>
              </td>
            </tr>
          `;
        });
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red">Error loading data</td></tr>';
      }
    }

        // Upload Result
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('admissionNumber', document.getElementById('admNo').value);
            formData.append('studentName', document.getElementById('sName').value);
            formData.append('studentClass', document.getElementById('sClass').value);
            formData.append('start', document.getElementById('startTime').value);
            formData.append('end', document.getElementById('endTime').value);
            formData.append('resultFile', document.getElementById('resultFile').files[0]);

            try {
                const res = await fetch(`${API_URL}/admin/upload?key=${ADMIN_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                document.getElementById('uploadMsg').textContent = data.message || 'Success!';
                document.getElementById('uploadForm').reset();
                loadResults();
            } catch (err) {
                document.getElementById('uploadMsg').textContent = 'Error uploading.';
                document.getElementById('uploadMsg').style.color = 'red';
            }
        });

        // Delete Result
        async function deleteResult(id) {
            if (confirm('Are you sure you want to delete this result?')) {
                try {
                    await fetch(`${API_URL}/admin/results/${id}?key=${ADMIN_KEY}`, { method: 'DELETE' });
                    loadResults();
                } catch (err) {
                    alert('Error deleting.');
                }
            }
        }

        // Initialize
        loadResults();

    </script>
</body>

</html>
