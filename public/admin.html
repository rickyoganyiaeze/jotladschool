<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Jotlad Schools</title>
  <base href="/">
  <link rel="icon" type="image/png" href="images/favicon.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { margin: 0; font-family: 'Nunito', sans-serif; background: #f4f7f6; }
    
    /* Layout */
    .admin-wrapper { display: flex; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, var(--Primary-blue-dark) 0%, var(--Primary-blue) 100%);
      color: white;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      box-shadow: 4px 0 10px rgba(0,0,0,0.1);
    }
    .sidebar-header {
      padding: 2rem;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar-header img { width: 60px; border-radius: 50%; margin-bottom: 0.5rem; border: 2px solid var(--accent-orange); }
    .sidebar-header h2 { margin: 0; font-size: 1.1rem; font-family: 'Poppins', sans-serif; }
    .sidebar-header p { margin: 0; font-size: 0.8rem; opacity: 0.8; }
    
    .nav-menu { padding: 1rem 0; flex-grow: 1; }
    .nav-item {
      display: flex;
      align-items: center;
      padding: 1rem 2rem;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      transition: 0.3s;
      border-left: 4px solid transparent;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
    .nav-item.active { 
      background: rgba(255,255,255,0.1); 
      color: white; 
      border-left-color: var(--accent-orange);
    }
    .nav-item i { width: 25px; margin-right: 10px; }
    
    .sidebar-footer { padding: 1.5rem 2rem; border-top: 1px solid rgba(255,255,255,0.1); }
    .btn-logout {
      display: block;
      width: 100%;
      padding: 0.8rem;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      text-align: center;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }
    .btn-logout:hover { background: #dc3545; border-color: #dc3545; }

    /* Main Content */
    .main-content { flex: 1; padding: 2rem; overflow-y: auto; }
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { color: var(--Primary-blue); margin: 0; }
    
    /* Cards & Sections */
    .dashboard-section { display: none; animation: fadeIn 0.5s; }
    .dashboard-section.active { display: block; }
    
    .card {
      background: white;
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--off-white);
    }
    .card-header h3 { margin: 0; color: var(--text-dark); font-size: 1.25rem; }

    /* Table Styling */
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--light-gray); }
    th { background: var(--off-white); font-weight: 700; color: var(--Primary-blue); font-size: 0.85rem; text-transform: uppercase; }
    tr:hover { background: #f8f9fa; }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge-success { background: #d1e7dd; color: #0f5132; }
    
    /* Action Buttons */
    .action-btn {
      padding: 0.5rem 0.75rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-right: 0.25rem;
      transition: 0.2s;
    }
    .btn-edit { background: #e0f2fe; color: #0284c7; }
    .btn-edit:hover { background: #0284c7; color: white; }
    .btn-delete { background: #fee2e2; color: #dc2626; }
    .btn-delete:hover { background: #dc2626; color: white; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: white;
      width: 100%;
      max-width: 500px;
      border-radius: var(--border-radius-lg);
      padding: 2rem;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #6c757d;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .admin-wrapper { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; }
      .sidebar-header { display: none; }
      .nav-menu { width: 100%; display: flex; justify-content: center; padding: 0.5rem; }
      .nav-item { padding: 0.75rem 1.5rem; border-bottom: 3px solid transparent; border-left: none; }
      .nav-item.active { border-bottom-color: var(--accent-orange); }
      .sidebar-footer { display: none; }
    }
  </style>
</head>
<body>

  <div class="admin-wrapper">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="images/Primarychoollogo.png" alt="Admin">
        <h2>Admin Panel</h2>
        <p>Jotlad Schools</p>
      </div>
      
      <nav class="nav-menu">
        <a href="#" class="nav-item active" onclick="showSection('uploadSection')">
          <i class="fas fa-upload"></i> Upload Result
        </a>
        <a href="#" class="nav-item" onclick="showSection('resultsSection')">
          <i class="fas fa-folder-open"></i> All Results
        </a>
        <a href="index.html" class="nav-item">
          <i class="fas fa-globe"></i> View Website
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="login.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <div class="page-header">
        <h1 id="pageTitle">Upload Result</h1>
        <p id="pageDesc">Fill in the details below to upload a new student result.</p>
      </div>

      <!-- Upload Section -->
      <div id="uploadSection" class="dashboard-section active">
        <div class="card">
          <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-row">
              <div class="form-group">
                <label>Admission Number</label>
                <input type="text" id="admNo" class="form-control" placeholder="e.g. JTC/2024/001" required>
              </div>
              <div class="form-group">
                <label>Student Name</label>
                <input type="text" id="sName" class="form-control" placeholder="Full Name" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Class</label>
                <input type="text" id="sClass" class="form-control" placeholder="e.g. JSS 1" required>
              </div>
              <div class="form-group">
                <label>Result File (PDF/Image)</label>
                <input type="file" id="resultFile" class="form-control" accept="image/*,.pdf" required>
              </div>
            </div>
            
            <div style="background: var(--off-white); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
              <p style="font-size: 0.9rem; margin-bottom: 0.5rem; color:var(--text-dark);"><strong>Availability (Optional):</strong></p>
              <div class="form-row">
                <div class="form-group">
                  <label>Start Date</label>
                  <input type="datetime-local" id="startTime" class="form-control">
                </div>
                <div class="form-group">
                  <label>End Date</label>
                  <input type="datetime-local" id="endTime" class="form-control">
                </div>
              </div>
            </div>

            <button type="submit" class="btn btn-accent btn-lg">
              <i class="fas fa-cloud-upload-alt"></i> Upload Result
            </button>
            <p id="uploadMsg" style="margin-top:1rem; font-weight:600;"></p>
          </form>
        </div>
      </div>

      <!-- All Results Section -->
      <div id="resultsSection" class="dashboard-section">
        <div class="card">
          <div class="card-header">
            <h3><i class="fas fa-history"></i> Saved Results</h3>
                <!-- Search Input could go here if needed -->
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Student Name</th>
                  <th>Adm No</th>
                  <th>Class</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="resultsTableBody">
                <!-- Data loads here -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h3 style="margin-bottom: 1.5rem; color: var(--Primary-blue);">Edit Result Details</h3>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>Admission Number</label>
          <input type="text" id="editAdmNo" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Student Name</label>
          <input type="text" id="editName" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Class</label>
          <input type="text" id="editClass" class="form-control" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Start Date</label>
            <input type="datetime-local" id="editStart" class="form-control">
          </div>
          <div class="form-group">
            <label>End Date</label>
            <input type="datetime-local" id="editEnd" class="form-control">
          </div>
        </div>
        <button type="submit" class="btn btn-Primary btn-block">Save Changes</button>
      </form>
    </div>
  </div>

  <script>
    // --- SECURITY LOCK ---
    if (sessionStorage.getItem('adminAuthorized') !== 'true') {
      window.location.href = "login.html";
    }

    const API_URL = 'https://joladschool.onrender.com/api';
    const ADMIN_KEY = 'mySecretAdminKey123'; 

    // --- NAVIGATION ---
    function showSection(sectionId) {
      // Hide all sections
      document.querySelectorAll('.dashboard-section').forEach(s => s.classList.remove('active'));
      // Remove active from nav
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      
      // Show selected section
      document.getElementById(sectionId).classList.add('active');
      
      // Update Header
      if(sectionId === 'uploadSection') {
        document.getElementById('pageTitle').textContent = "Upload Result";
        document.getElementById('pageDesc').textContent = "Fill in the details below to upload a new student result.";
        document.querySelector('.nav-item:nth-child(1)').classList.add('active');
      } else {
        document.getElementById('pageTitle').textContent = "All Results";
        document.getElementById('pageDesc').textContent = "View, edit, or delete uploaded student results.";
        document.querySelector('.nav-item:nth-child(2)').classList.add('active');
        loadResults(); // Refresh list when viewing
      }
    }

    // --- UPLOAD LOGIC ---
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('uploadMsg');
      msg.textContent = "Uploading...";
      msg.style.color = "var(--Primary-blue)";

      const formData = new FormData();
      formData.append('admissionNumber', document.getElementById('admNo').value);
      formData.append('studentName', document.getElementById('sName').value);
      formData.append('studentClass', document.getElementById('sClass').value);
      formData.append('start', document.getElementById('startTime').value);
      formData.append('end', document.getElementById('endTime').value);
      formData.append('resultFile', document.getElementById('resultFile').files[0]);

      try {
        const res = await fetch(`${API_URL}/admin/upload?key=${ADMIN_KEY}`, {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        
        if (data.success) {
          msg.textContent = "✅ Result Uploaded Successfully!";
          msg.style.color = "green";
          e.target.reset();
        } else {
          msg.textContent = data.message;
          msg.style.color = "red";
        }
      } catch (err) {
        msg.textContent = "Connection error.";
        msg.style.color = "red";
      }
    });

    // --- RESULTS TABLE LOGIC ---
    async function loadResults() {
      const tbody = document.getElementById('resultsTableBody');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Loading...</td></tr>';

      try {
        const res = await fetch(`${API_URL}/admin/results?key=${ADMIN_KEY}`);
        const data = await res.json();

        if (data.results.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No results found.</td></tr>';
          return;
        }

        tbody.innerHTML = '';
        data.results.forEach(r => {
          // Format Date
          const date = new Date(r.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
          
          // Check Status
          const now = new Date();
          let status = '<span class="badge badge-success">Available</span>';
          if (r.availabilityStart && r.availabilityEnd) {
             if (now < new Date(r.availabilityStart)) status = '<span class="badge" style="background:#ffeeba; color:#856404;">Scheduled</span>';
             if (now > new Date(r.availabilityEnd)) status = '<span class="badge" style="background:#f5c6cb; color:#721c24;">Expired</span>';
          }

          tbody.innerHTML += `
            <tr>
              <td>${date}</td>
              <td><strong>${r.studentName}</strong></td>
              <td>${r.admissionNumber}</td>
              <td>${r.studentClass}</td>
              <td>${status}</td>
              <td>
                <button class="action-btn btn-edit" onclick="openEditModal('${r._id}', '${r.admissionNumber}', '${r.studentName}', '${r.studentClass}', '${r.availabilityStart}', '${r.availabilityEnd}')">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="action-btn btn-delete" onclick="deleteResult('${r._id}')">
                  <i class="fas fa-trash"></i>
                </button>
              </td>
            </tr>
          `;
        });
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red">Error loading data</td></tr>';
      }
    }

    // --- EDIT LOGIC ---
    function openEditModal(id, adm, name, cls, start, end) {
      document.getElementById('editId').value = id;
      document.getElementById('editAdmNo').value = adm;
      document.getElementById('editName').value = name;
      document.getElementById('editClass').value = cls;
      
      // Handle dates for input type datetime-local
      if(start) document.getElementById('editStart').value = start.substring(0, 16);
      if(end) document.getElementById('editEnd').value = end.substring(0, 16);

      document.getElementById('editModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('active');
    }

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      
      const updatedData = {
        admissionNumber: document.getElementById('editAdmNo').value,
        studentName: document.getElementById('editName').value,
        studentClass: document.getElementById('editClass').value,
        start: document.getElementById('editStart').value,
        end: document.getElementById('editEnd').value
      };

      try {
        const res = await fetch(`${API_URL}/admin/results/${id}?key=${ADMIN_KEY}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updatedData)
        });
        const data = await res.json();
        
        if (data.success) {
          closeModal();
          loadResults();
        } else {
          alert("Update failed: " + data.message);
        }
      } catch (err) {
        alert("Connection error");
      }
    });

    // --- DELETE LOGIC ---
    async function deleteResult(id) {
      if(confirm('Are you sure you want to delete this result?')) {
        const res = await fetch(`${API_URL}/admin/results/${id}?key=${ADMIN_KEY}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) loadResults();
      }
    }

    // Initial load
    loadResults();

  </script>
</body>
</html>
