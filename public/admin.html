<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Jotlad Schools</title>
  <base href="/">
  <link rel="icon" type="image/png" href="images/favicon.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Layout */
    .admin-container { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: linear-gradient(135deg, var(--Primary-blue) 0%, var(--Primary-blue-dark) 100%); color: white; padding: 2rem; flex-shrink: 0; display: flex; flex-direction: column; }
    .sidebar-brand { margin-bottom: 2rem; text-align: center; }
    .sidebar-brand img { width: 60px; margin-bottom: 0.5rem; }
    .sidebar-brand h3 { font-size: 1.1rem; margin: 0; }
    .sidebar-nav { list-style: none; padding: 0; flex-grow: 1; }
    .sidebar-nav li { margin-bottom: 0.5rem; }
    .sidebar-nav a { color: rgba(255,255,255,0.8); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 0.75rem; padding: 0.9rem 1rem; border-radius: 8px; transition: 0.3s; cursor: pointer; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(255,255,255,0.15); color: white; }
    .sidebar-footer { margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }

    /* Main Content */
    .main-content { flex: 1; background: var(--off-white); padding: 2rem; overflow-y: auto; }
    .page-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
    .page-header h1 { font-size: 1.75rem; color: var(--text-dark); margin: 0; }

    /* Cards */
    .card { background: white; border-radius: var(--border-radius-lg); padding: 2rem; box-shadow: var(--shadow-sm); margin-bottom: 2rem; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 2px solid var(--off-white); padding-bottom: 1rem; }
    .card-header h3 { margin: 0; color: var(--Primary-blue); font-size: 1.25rem; }

    /* Table */
    .table-responsive { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--light-gray); }
    th { background: var(--off-white); font-weight: 700; color: var(--text-dark); font-size: 0.85rem; text-transform: uppercase; }
    .status-badge { padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }
    .status-active { background: #e6fffa; color: #00a878; }
    .status-pending { background: #fff3cd; color: #856404; }

    /* Hide sections by default */
    #resultsSection { display: none; }
    
    /* Mobile */
    @media (max-width: 768px) {
      .admin-container { flex-direction: column; }
      .sidebar { width: 100%; padding: 1rem; }
      .sidebar-nav { display: flex; overflow-x: auto; gap: 0.5rem; margin-bottom: 1rem; }
      .sidebar-nav li { margin-bottom: 0; }
      .sidebar-footer { display: none; }
      .main-content { padding: 1rem; }
    }
  </style>
</head>

<body>

  <div class="admin-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="images/Primarychoollogo.png" alt="Logo">
        <h3>Admin Panel</h3>
      </div>
      <ul class="sidebar-nav">
        <li><a onclick="showSection('upload')" id="nav-upload" class="active"><i class="fas fa-upload"></i> Upload Result</a></li>
        <li><a onclick="showSection('results')" id="nav-results"><i class="fas fa-folder-open"></i> Saved Results</a></li>
        <li><a href="index.html"><i class="fas fa-globe"></i> View Website</a></li>
      </ul>
      <div class="sidebar-footer">
        <small>Logged in as Admin</small>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <div class="page-header">
        <h1 id="pageTitle">Upload Result</h1>
        <button onclick="location.href='index.html'" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Back to Site</button>
      </div>

      <!-- Upload Section -->
      <div id="uploadSection">
        <div class="card">
          <div class="card-header">
            <h3><i class="fas fa-plus-circle"></i> New Result</h3>
          </div>
          <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-row">
              <div class="form-group">
                <label>Admission Number</label>
                <input type="text" id="admNo" class="form-control" placeholder="e.g. JTC/2024/001" required>
              </div>
              <div class="form-group">
                <label>Student Name</label>
                <input type="text" id="sName" class="form-control" placeholder="Full Name" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Class</label>
                <input type="text" id="sClass" class="form-control" placeholder="e.g. JSS 1" required>
              </div>
              <div class="form-group">
                <label>Result File (PDF/Image)</label>
                <input type="file" id="resultFile" class="form-control" accept="image/*,.pdf" required>
              </div>
            </div>
            
            <div style="background: var(--off-white); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
              <p style="font-size: 0.9rem; margin-bottom: 0.5rem;"><strong>Availability (Optional):</strong></p>
              <div class="form-row">
                <div class="form-group">
                  <label>Start Date</label>
                  <input type="datetime-local" id="startTime" class="form-control">
                </div>
                <div class="form-group">
                  <label>End Date</label>
                  <input type="datetime-local" id="endTime" class="form-control">
                </div>
              </div>
            </div>

            <button type="submit" class="btn btn-accent btn-lg">
              <i class="fas fa-upload"></i> Upload Result
            </button>
            <p id="uploadMsg" style="margin-top:1rem; color:green;"></p>
          </form>
        </div>
      </div>

      <!-- Saved Results Section -->
      <div id="resultsSection">
        <div class="card">
          <div class="card-header">
            <h3><i class="fas fa-list"></i> All Uploaded Results</h3>
          </div>
          <div class="table-responsive">
            <table id="resultsTable">
              <thead>
                <tr>
                  <th>Student Name</th>
                  <th>Adm No</th>
                  <th>Class</th>
                  <th>Uploaded On</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <!-- Results will load here -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; justify-content:center; align-items:center;">
    <div style="background:white; padding:2rem; border-radius:12px; width:90%; max-width:500px;">
      <h3 style="margin-bottom:1rem;">Edit Result</h3>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>Student Name</label>
          <input type="text" id="editName" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Class</label>
          <input type="text" id="editClass" class="form-control" required>
        </div>
        <div style="margin-top:1.5rem; display:flex; gap:1rem;">
          <button type="button" onclick="closeEditModal()" class="btn btn-outline" style="flex:1;">Cancel</button>
          <button type="submit" class="btn btn-Primary" style="flex:1;">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // SECURITY LOCK - DO NOT REMOVE
    if (sessionStorage.getItem('adminAuthorized') !== 'true') {
      window.location.href = "login.html";
    }

    // CONFIGURATION
    const API_URL = 'https://joladschool.onrender.com/api';
    const ADMIN_KEY = 'mySecretAdminKey123'; 

    // --- Navigation Logic ---
    function showSection(section) {
      document.getElementById('uploadSection').style.display = 'none';
      document.getElementById('resultsSection').style.display = 'none';
      document.getElementById('nav-upload').classList.remove('active');
      document.getElementById('nav-results').classList.remove('active');

      if (section === 'upload') {
        document.getElementById('uploadSection').style.display = 'block';
        document.getElementById('nav-upload').classList.add('active');
        document.getElementById('pageTitle').textContent = "Upload Result";
      } else {
        document.getElementById('resultsSection').style.display = 'block';
        document.getElementById('nav-results').classList.add('active');
        document.getElementById('pageTitle').textContent = "Saved Results";
        loadResults(); // Reload results when viewing
      }
    }

    // --- Upload Logic ---
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData();
      formData.append('admissionNumber', document.getElementById('admNo').value);
      formData.append('studentName', document.getElementById('sName').value);
      formData.append('studentClass', document.getElementById('sClass').value);
      formData.append('start', document.getElementById('startTime').value);
      formData.append('end', document.getElementById('endTime').value);
      formData.append('resultFile', document.getElementById('resultFile').files[0]);

      try {
        const res = await fetch(`${API_URL}/admin/upload?key=${ADMIN_KEY}`, {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        
        document.getElementById('uploadMsg').textContent = data.message || 'Success!';
        document.getElementById('uploadForm').reset();
        
        // Automatically switch to Saved Results after upload
        setTimeout(() => {
          showSection('results');
        }, 1000);

      } catch (err) {
        document.getElementById('uploadMsg').textContent = 'Error uploading.';
        document.getElementById('uploadMsg').style.color = 'red';
      }
    });

    // --- Load Results Logic ---
    async function loadResults() {
      const tbody = document.querySelector('#resultsTable tbody');
      tbody.innerHTML = '<tr><td colspan="6">Loading...</td></tr>';

      try {
        const res = await fetch(`${API_URL}/admin/results?key=${ADMIN_KEY}`);
        const data = await res.json();
        tbody.innerHTML = '';
        
        if(data.results.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No results found.</td></tr>';
          return;
        }

        data.results.forEach(r => {
          // Format Date
          const date = new Date(r.createdAt);
          const formattedDate = date.toLocaleDateString("en-NG") + " " + date.toLocaleTimeString("en-NG");

          // Check Status
          let statusHtml = '<span class="status-badge status-active">Active</span>';
          const now = new Date();
          if (r.availabilityEnd && new Date(r.availabilityEnd) < now) {
            statusHtml = '<span class="status-badge status-pending">Expired</span>';
          }

          tbody.innerHTML += `
            <tr>
              <td>${r.studentName}</td>
              <td>${r.admissionNumber}</td>
              <td>${r.studentClass}</td>
              <td>${formattedDate}</td>
              <td>${statusHtml}</td>
              <td>
                <button onclick="openEditModal('${r._id}', '${r.studentName}', '${r.studentClass}')" class="btn btn-sm btn-outline" style="margin-right:0.5rem;"><i class="fas fa-edit"></i></button>
                <button onclick="deleteResult('${r._id}')" class="btn btn-sm btn-outline" style="color:red; border-color:red;"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
          `;
        });
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="6">Error loading data</td></tr>';
      }
    }

    // --- Edit Logic ---
    function openEditModal(id, name, studentClass) {
      document.getElementById('editId').value = id;
      document.getElementById('editName').value = name;
      document.getElementById('editClass').value = studentClass;
      document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const name = document.getElementById('editName').value;
      const sClass = document.getElementById('editClass').value;

      // We need a backend route for editing details. 
      // For now, we will just alert the user that this requires a backend update, 
      // OR we assume the backend has a PUT route similar to delete.
      // Let's assume we send a PUT request:
      
      try {
         const res = await fetch(`${API_URL}/admin/results/${id}?key=${ADMIN_KEY}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ studentName: name, studentClass: sClass })
         });
         const data = await res.json();
         if (data.success) {
            closeEditModal();
            loadResults();
         } else {
            alert("Update failed: " + data.message);
         }
      } catch (err) {
         alert("Server not configured for editing yet, or connection error.");
         // If you haven't added the PUT route in server.js, this will fail.
         // But I will provide the server.js update next.
      }
    });

    // --- Delete Logic ---
    async function deleteResult(id) {
      if(confirm('Are you sure you want to delete this result?')) {
        try {
          await fetch(`${API_URL}/admin/results/${id}?key=${ADMIN_KEY}`, { method: 'DELETE' });
          loadResults();
        } catch (err) {
          console.error(err);
        }
      }
    }
  </script>
</body>
</html>
