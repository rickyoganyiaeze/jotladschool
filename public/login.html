<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Jotlad Schools</title>
  <link rel="icon" type="image/png" href="images/favicon.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0056b3 0%, #003d80 100%); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
    .login-card { background: white; padding: 3rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; max-width: 400px; width: 100%; }
    .logo { width: 80px; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #003d80; }
    p { color: #6c757d; margin-bottom: 2rem; font-size: 0.9rem; }
    input { width: 100%; padding: 1rem; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; margin-bottom: 1.5rem; text-align: center; }
    input:focus { border-color: #0056b3; outline: none; }
    button { width: 100%; padding: 1rem; background: #ff6600; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    button:hover { background: #e65c00; }
    .error { color: red; font-size: 0.85rem; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="images/Primarychoollogo.png" alt="Logo" class="logo">
    <h1>Admin Access</h1>
    <p>Please enter the admin password to continue.</p>
    <form id="loginForm">
      <input type="password" id="passwordInput" placeholder="Enter Password" required>
      <button type="submit">Unlock Admin Panel</button>
    </form>
    <p id="errorMsg" class="error">Incorrect password.</p>
    <a href="index.html" style="display:block; margin-top:1.5rem; color:#0056b3; text-decoration:none; font-size:0.9rem;">← Back to Website</a>
  </div>

  <script>
    // CHANGE THIS PASSWORD TO WHATEVER YOU WANT
    const CORRECT_PASSWORD = "jotlad123";

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const password = document.getElementById('passwordInput').value;
      const error = document.getElementById('errorMsg');

      if (password === CORRECT_PASSWORD) {
        sessionStorage.setItem('adminAuthorized', 'true');
        window.location.href = "admin.html";
      } else {
        error.style.display = 'block';
      }
    });
  </script>
</body>
</html>
