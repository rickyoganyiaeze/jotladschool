<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | jolad Schools</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0056b3 0%, #003d80 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            width: 80px;
            margin-bottom: 1rem;
        }

        h1 {
            color: #0056b3;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: #6c757d;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #0056b3;
            outline: none;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: #ff6600;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e65c00;
        }

        .error {
            color: red;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }

        /* New styles for the eye icon */
        .password-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .password-wrapper input {
            margin-bottom: 0;
            padding-right: 3rem; /* Makes room so text doesn't go under the eye */
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #6c757d;
            font-size: 1rem;
            padding: 0;
            width: auto;
        }

        .toggle-password:hover {
            color: #0056b3;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <img src="images/Primarychoollogo.png" alt="Logo" class="logo">
        <h1>Admin Access</h1>
        <p>Please enter the admin password to continue.</p>

        <form id="loginForm">
            <div class="password-wrapper">
                <input type="password" id="passwordInput" placeholder="Enter Password" required>
                <button type="button" class="toggle-password" id="togglePassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            <button type="submit">Unlock Admin Panel</button>
        </form>
        <p id="errorMsg" class="error">Incorrect password. Please try again.</p>
        <a href="index.html" style="display:block; margin-top:1.5rem; color:#0056b3; text-decoration:none; font-size:0.9rem;">← Back to Website</a>
    </div>

    <script>
        // CHANGE THIS TO YOUR DESIRED WEBSITE PASSWORD
        const CORRECT_PASSWORD = "jolad123";

        // Eye icon toggle logic
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('passwordInput');
        
        toggleBtn.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        // Form submit logic
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const pass = document.getElementById('passwordInput').value;

            if (pass === CORRECT_PASSWORD) {
                // Save authorization in session storage
                sessionStorage.setItem('adminAuthorized', 'true');
                // Redirect to admin dashboard
                window.location.href = "admin.html";
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>

</html>
