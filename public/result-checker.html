<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Result | Jotlad Group of Schools</title>
  <base href="/">
  <link rel="stylesheet" href="styles.css">
  <style>
    .result-card { max-width: 500px; margin: 3rem auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .result-header { text-align: center; margin-bottom: 2rem; }
    .result-viewer { width: 100%; height: 600px; border: 1px solid #ddd; margin-top: 1rem; }
    .error-msg { color: red; text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
  <!-- Include Navbar from previous design here or use JS to load it -->

  <main>
    <section class="page-header"><div class="container"><h1>Result Checker</h1></div></section>
    
    <div class="container">
      <div class="result-card">
        <!-- Login Step -->
        <div id="loginStep">
          <h3>Enter Admission Number</h3>
          <form id="loginForm">
            <div class="form-group">
              <input type="text" id="admissionNumber" class="form-control" placeholder="e.g. JTC/2024/001" required>
            </div>
            <button type="submit" class="btn btn-Primary btn-lg btn-block">Check Result</button>
            <p id="loginError" class="error-msg"></p>
          </form>
        </div>

        <!-- Result Step -->
        <div id="resultStep" style="display:none;">
          <h3 id="studentNameDisplay"></h3>
          <p id="classDisplay"></p>
          <div id="resultContainer"></div>
          <button id="logoutBtn" class="btn btn-outline btn-block" style="margin-top:1rem;">Check Another</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const API_URL = 'http://localhost:5000/api'; // Change this in production

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const admissionNumber = document.getElementById('admissionNumber').value;
      const errorDiv = document.getElementById('loginError');
      errorDiv.textContent = '';

      try {
        const res = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ admissionNumber })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('loginStep').style.display = 'none';
          document.getElementById('resultStep').style.display = 'block';
          document.getElementById('studentNameDisplay').textContent = `Result for: ${data.student.studentName}`;
          document.getElementById('classDisplay').textContent = `Class: ${data.student.studentClass}`;
          
          // Check file type
          const fileUrl = `http://localhost:5000${data.student.resultFile}`;
          if (data.student.resultFile.endsWith('.pdf')) {
            document.getElementById('resultContainer').innerHTML = `<iframe src="${fileUrl}" class="result-viewer"></iframe>`;
          } else {
            document.getElementById('resultContainer').innerHTML = `<img src="${fileUrl}" style="width:100%; border-radius:8px;">`;
          }
        } else {
          errorDiv.textContent = data.message;
        }
      } catch (err) {
        errorDiv.textContent = 'Connection error. Please try again.';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      document.getElementById('loginStep').style.display = 'block';
      document.getElementById('resultStep').style.display = 'none';
      document.getElementById('admissionNumber').value = '';
    });
  </script>
</body>
</html>
